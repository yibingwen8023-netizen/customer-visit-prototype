function selectStrategyType(type) {
  strategyFormState.strategyType = type;
  // Update type buttons
  const group = document.getElementById('strategy-type-group');
  group.querySelectorAll('.strategy-type-btn').forEach(b => {
    b.classList.remove('active');
    b.classList.add('disabled');
  });
  const idx = type === 'mass_message' ? 0 : 1;
  group.querySelectorAll('.strategy-type-btn')[idx].classList.add('active');
  group.querySelectorAll('.strategy-type-btn')[idx].classList.remove('disabled');

  // Hide description cards
  document.getElementById('strategy-type-desc').classList.add('hidden');

  // Show and render flow
  const flowArea = document.getElementById('strategy-flow-area');
  flowArea.classList.remove('hidden');
  flowArea.innerHTML = renderStrategyFlow(type, null);
}

function renderStrategyFlow(type, data) {
  if (type === 'mass_message') {
    return renderMassMessageFlow(data);
  } else if (type === 'welcome_message') {
    return renderWelcomeMessageFlow(data);
  }
  return '';
}

function renderMassMessageFlow(data) {
  const triggerMode = strategyFormState.triggerMode || 'timed';
  const freq = strategyFormState.triggerFrequency || '每天';
  const time = strategyFormState.triggerTime || '10:00';
  const event = strategyFormState.triggerEvent || 'add_wechat';

  // Build trigger node content
  let triggerContent = '';
  if (triggerMode === 'timed') {
    triggerContent = `
      <div class="mini-radio-group" id="flow-trigger-mode-group">
        <div class="mini-radio-btn ${triggerMode==='timed'?'active':''}" onclick="switchFlowTriggerMode('timed')">定时</div>
        <div class="mini-radio-btn ${triggerMode==='event'?'active':''}" onclick="switchFlowTriggerMode('event')">事件</div>
      </div>
      <div id="flow-trigger-config" style="margin-top:8px">
        ${renderFlowTimerConfig(freq, time)}
      </div>`;
  } else {
    triggerContent = `
      <div class="mini-radio-group" id="flow-trigger-mode-group">
        <div class="mini-radio-btn ${triggerMode==='timed'?'active':''}" onclick="switchFlowTriggerMode('timed')">定时</div>
        <div class="mini-radio-btn ${triggerMode==='event'?'active':''}" onclick="switchFlowTriggerMode('event')">事件</div>
      </div>
      <div id="flow-trigger-config" style="margin-top:8px">
        ${renderFlowEventConfig(event)}
      </div>`;
  }

  // Build segment node content
  const segs = strategySelectedSegments;
  let segmentContent = '';
  if (segs.length > 0) {
    segmentContent = `<div class="segment-tags">${segs.map(n => `<span class="tag">${n}</span>`).join('')}</div>`;
  } else {
    segmentContent = `<div class="empty-segment">请在上方筛选条件中选择分群</div>`;
  }

  return `
    <div class="strategy-flow">
      <div class="flow-node flow-node-trigger">
        <div class="flow-node-header"><i class="ri-time-line"></i> 触发条件</div>
        <div class="node-content">${triggerContent}</div>
      </div>
      <div class="flow-arrow"><i class="ri-arrow-right-line"></i></div>
      <div class="flow-node flow-node-segment">
        <div class="flow-node-header"><i class="ri-group-line"></i> 筛选分群</div>
        <div class="node-content">${segmentContent}</div>
      </div>
      <div class="flow-arrow"><i class="ri-arrow-right-line"></i></div>
      <div class="flow-node flow-node-execute">
        <div class="flow-node-header"><i class="ri-play-circle-line"></i> 执行</div>
        <div class="node-content">
          <div style="font-weight:500;color:#333">创建群发</div>
          <div class="node-desc">对筛选出的客户创建群发任务</div>
        </div>
      </div>
    </div>`;
}

        </div>

}

      <span style="font-size:12px;color:#999">频率</span>
      <select id="flow-freq" onchange="switchFlowFreq(this.value)" style="width:80px;height:28px;font-size:12px;border:1px solid #d9d9d9;border-radius:4px;padding:0 4px">

      <span style="font-size:12px;color:#999">频率</span>
      <select id="flow-freq" onchange="switchFlowFreq(this.value)" style="width:80px;height:28px;font-size:12px;border:1px solid #d9d9d9;border-radius:4px;padding:0 4px">

  }
  return configHtml;
}

function renderFlowEventConfig(event) {
  return `<div style="margin-top:4px">

function saveStrategy(editId) {
  // Validate name
  const nameValid = validateStrategyName();
  if (!nameValid) return;

  const name = document.getElementById('strategy-name').value.trim();
  const description = document.getElementById('strategy-desc').value.trim();

  // Validate segments
  if (strategySelectedSegments.length === 0) {
    showMessage('warning', '请选择至少一个分群');
    return;
  }

  // Validate strategy type
  if (!strategyFormState.strategyType) {
    showMessage('error', '请选择策略类型');
    return;
  }

  // For mass_message, validate trigger config
  if (strategyFormState.strategyType === 'mass_message') {
    const triggerMode = strategyFormState.triggerMode || 'timed';
    if (triggerMode === 'timed') {
      const freqEl = document.getElementById('flow-freq');
      const timeEl = document.getElementById('flow-time');
      if (freqEl) strategyFormState.triggerFrequency = freqEl.value;
      if (timeEl) strategyFormState.triggerTime = timeEl.value;
    } else {
      const eventEl = document.getElementById('flow-event');
      if (eventEl) strategyFormState.triggerEvent = eventEl.value;
    }
  }

  const actionTypeLabel = strategyFormState.strategyType === 'mass_message' ? '群发策略' : '欢迎语策略';

  if (editId) {
    const s = store.strategies.find(x => x.id === editId);
    if (s) {
      s.name = name;
      s.description = description;
      s.actionType = strategyFormState.strategyType;
      s.segmentNames = [...strategySelectedSegments];
      s.triggerMode = strategyFormState.triggerMode;
      s.triggerFrequency = strategyFormState.triggerFrequency;
      s.triggerTime = strategyFormState.triggerTime;
      s.triggerEvent = strategyFormState.triggerEvent;
      s.conditionEnabled = strategyFormState.conditionEnabled;
      s.branches = JSON.parse(JSON.stringify(strategyBranches));
    }
    showMessage('success', '策略更新成功');
  } else {
    store.strategies.unshift({
      id: store.nextStrategyId++,
      name,
      description,
      actionType: strategyFormState.strategyType,
      status: 'enabled',
      createdBy: '当前用户',
      createdAt: new Date().toISOString().slice(0,16).replace('T',' '),
      segmentNames: [...strategySelectedSegments],
      triggerMode: strategyFormState.triggerMode,
      triggerFrequency: strategyFormState.triggerFrequency,
      triggerTime: strategyFormState.triggerTime,
      triggerEvent: strategyFormState.triggerEvent,
      conditionEnabled: strategyFormState.conditionEnabled,
      branches: JSON.parse(JSON.stringify(strategyBranches))
    });
    showMessage('success', '策略创建成功');
  }
  strategyFilterState = { name: '', status: 'all', actionType: 'all' };
  navigate('#/strategy/list');
}

function contentToEditorHtml(content) {
  return content.replace(/\{\{([^}]+)\}\}/g, `<span class="var-tag" contenteditable="false" data-var="{{$1}}">{{${'$'}{1}}}<span class="remove-var" onclick="removeVarTag(this,event)">&times;</span></span>`);
}

function renderPreviewContent(content) {
  let html = content;
  VARIABLES.forEach(v => {
    html = html.replace(new RegExp(v.key.replace(/[{}]/g, '\\$&'), 'g'), `<span class="preview-var">${v.example}</span>`);
  });
  return `<div class="preview-bubble">${html}</div>`;
}

function execFormat(cmd) {
  document.execCommand(cmd, false, null);

function toggleVarPanel() {
  const panel = document.getElementById('var-panel');
  panel.classList.toggle('show');

function insertVariable(key) {
  const editor = document.getElementById('template-editor');
  editor.focus();
  const tag = document.createElement('span');
  tag.className = 'var-tag';
  tag.contentEditable = 'false';
  tag.dataset.var = key;
  tag.innerHTML = `${key}<span class="remove-var" onclick="removeVarTag(this,event)">&times;</span>`;

  const selection = window.getSelection();
  if (selection.rangeCount > 0) {
    const range = selection.getRangeAt(0);
    // Check if we're inside the editor
    if (editor.contains(range.commonAncestorContainer)) {
      range.insertNode(tag);
      range.setStartAfter(tag);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    } else {
      editor.appendChild(tag);
    }
  } else {
    editor.appendChild(tag);
  }

  document.getElementById('var-panel').classList.remove('show');
  onEditorInput();
}

function removeVarTag(el, event) {
  event.stopPropagation();
  event.preventDefault();
  const tag = el.closest('.var-tag');
  if (tag) tag.remove();
  onEditorInput();
}

function getEditorContent() {
  const editor = document.getElementById('template-editor');
  let text = '';
  const walk = (node) => {
    if (node.nodeType === 3) {
      text += node.textContent;
    } else if (node.nodeType === 1) {
      if (node.classList && node.classList.contains('var-tag')) {
        text += node.dataset.var || '';
      } else {
        node.childNodes.forEach(walk);
      }
    }
  };
  editor.childNodes.forEach(walk);
  return text;
}

function onEditorInput() {
  const editor = document.getElementById('template-editor');
  const content = getEditorContent();
  const charCount = document.getElementById('editor-char-count');
  charCount.textContent = `${content.length}/2000`;
  charCount.classList.toggle('over', content.length >= 2000);

  // Update live preview
  const preview = document.getElementById('live-preview');
  if (content.trim()) {
    preview.innerHTML = renderPreviewContent(content);
  } else {
    preview.innerHTML = '<div class="preview-empty">编辑内容后实时预览</div>';
  }
}

    error.classList.remove('hidden');
    return false;
  }
  input.classList.remove('error');
  error.classList.add('hidden');
  return true;
}

// ===== Attachment Functions =====
window._templateAttachments = [];
const ATTACHMENT_TYPES = {
  image: {name:'图片', icon:'ri-image-line', color:'#1890ff'},
  link: {name:'图文链接', icon:'ri-link', color:'#52c41a'},
  miniapp: {name:'小程序', icon:'ri-smartphone-line', color:'#722ed1'},
  video: {name:'视频', icon:'ri-video-line', color:'#fa8c16'},
  file: {name:'文件', icon:'ri-file-line', color:'#999'}
};

window.toggleAttachmentTypePanel = function() {
  if (window._templateAttachments.length >= 9) {
    showMessage('warning', '最多添加9个附件');
    return;
  }
  const panel = document.getElementById('attachment-type-panel');
  const btn = document.getElementById('add-attachment-btn');
  const isHidden = panel.style.display === 'none';
  panel.style.display = isHidden ? 'block' : 'none';
  btn.innerHTML = isHidden
    ? '<i class="ri-subtract-line"></i> 收起附件类型'
    : '<i class="ri-add-line"></i> 添加附件';
};

window.addAttachment = function(type) {
  if (window._templateAttachments.length >= 9) {
    showMessage('warning', '最多添加9个附件');
    return;
  }
  const typeInfo = ATTACHMENT_TYPES[type];
  const mockNames = {
    image: '产品介绍.jpg', link: '活动详情', miniapp: '预约小程序',
    video: '宣传视频.mp4', file: '产品资料.pdf'
  };
  const mockSizes = {image:'2.3MB', link:'-', miniapp:'-', video:'8.1MB', file:'1.5MB'};
  const att = {
    id: Date.now(),
    type,
    name: mockNames[type],
    size: mockSizes[type]
  };
  window._templateAttachments.push(att);
  renderAttachmentList();
  showMessage('success', `${typeInfo.name}附件已添加`);
};

window.removeAttachment = function(id) {
  window._templateAttachments = window._templateAttachments.filter(a => a.id !== id);
  renderAttachmentList();
};

window.renderAttachmentList = function() {
  const list = document.getElementById('attachment-list');
  const count = document.getElementById('attachment-count');
  const btn = document.getElementById('add-attachment-btn');
  const attachments = window._templateAttachments;
  count.textContent = `已添加 ${attachments.length}/9 个附件`;
  if (attachments.length >= 9) {
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.style.cursor = 'not-allowed';
  } else {
    btn.disabled = false;
    btn.style.opacity = '';
    btn.style.cursor = '';
  }
  if (attachments.length === 0) {
    list.innerHTML = '';
    return;
  }
  list.innerHTML = attachments.map(a => {
    const t = ATTACHMENT_TYPES[a.type];
    return `<div class="attachment-card">
      <i class="ri-draggable" style="color:#999;cursor:grab;margin-right:8px"></i>
      <i class="${t.icon}" style="color:${t.color};font-size:20px;margin-right:8px"></i>
      <div class="attachment-card-info">
        <div class="attachment-card-name">${t.name}-${a.name}</div>
        <div class="attachment-card-meta">${a.size !== '-' ? a.size + ' · ' : ''}${a.type.toUpperCase()}</div>
      </div>
      <i class="ri-close-line attachment-card-delete" onclick="removeAttachment(${a.id})"></i>
    </div>`;
  }).join('');
};

function saveTemplate(editId) {
  const nameValid = validateTemplateName();
  if (!nameValid) return;
  const name = document.getElementById('template-name').value.trim();
  const content = getEditorContent();
  if (!content.trim()) { showMessage('error', '请输入消息内容'); return; }

  const varCount = (content.match(/\{\{[^}]+\}\}/g) || []).length;
  const now = new Date().toISOString().slice(0,16).replace('T',' ');

  if (editId) {
    const t = store.templates.find(x => x.id === editId);
    if (t) {
      t.name = name;
      t.content = content;
      t.variableCount = varCount;
      t.attachments = JSON.parse(JSON.stringify(window._templateAttachments));
      t.updatedAt = now;
    }
    showMessage('success', '模板更新成功');
  } else {
    store.templates.unshift({
      id: store.nextTemplateId++,
      name, content, variableCount: varCount,
      attachments: JSON.parse(JSON.stringify(window._templateAttachments)),
      createdAt: now, updatedAt: now
    });
    showMessage('success', '模板创建成功');
  }
  navigate('#/template/list');
}

// ===== Broadcast Event List =====
let broadcastEventFilter = { sendType: 'all', keyword: '', startDate: '', endDate: '' };

function getAttachmentIcon(type) {
  const map = { image: 'ri-image-line', miniprogram: 'ri-apps-line', link: 'ri-link', file: 'ri-file-line', video: 'ri-video-line' };
  return map[type] || 'ri-attachment-line';
}
function getAttachmentLabel(type) {
  const map = { image: '图片', miniprogram: '小程序', link: '链接', file: '文件', video: '视频' };
  return map[type] || '附件';
}

function renderBroadcastEventList(container) {
  const data = store.broadcastEvents;
  
  // Filter data
  let filtered = data;
  if (broadcastEventFilter.sendType !== 'all') {
    filtered = filtered.filter(e => e.sendType === broadcastEventFilter.sendType);
  }
  if (broadcastEventFilter.keyword) {
    filtered = filtered.filter(e => e.name.includes(broadcastEventFilter.keyword));
  }
  
  let tableRows = filtered.map(e => {
    const progress = e.targetCount > 0 ? Math.round(e.sentCount / e.targetCount * 100) : 0;
    const isCompleted = e.status === 'completed';
    
    // Send type tag
    const sendTypeTag = e.sendType === 'strategy'
      ? '<span class="tag tag-blue">策略触发</span>'
      : '<span class="tag tag-green">手动发送</span>';
    
    // Attachment tags
    let attachmentHtml = '';
    if (e.attachments && e.attachments.length > 0) {
      // Count by type
      const typeCount = {};
      e.attachments.forEach(a => {
        typeCount[a.type] = (typeCount[a.type] || 0) + 1;
      });
      attachmentHtml = '<div class="attachment-tags">';
      for (const [type, count] of Object.entries(typeCount)) {
        const icon = getAttachmentIcon(type);
        const label = getAttachmentLabel(type);
        attachmentHtml += `<span class="attachment-tag"><i class="${icon}"></i>${label} x${count}</span>`;
      }
      attachmentHtml += '</div>';
    }
    
    // Content cell
    const contentText = e.content.length > 30 ? e.content.substring(0, 30) + '...' : e.content;
    const contentCell = `<div><div class="text-ellipsis" style="max-width:none" title="${e.content}">${contentText}</div>${attachmentHtml}</div>`;
    
    // Status tag with icon
    let statusTag = '';
    if (e.status === 'pending') {
      statusTag = '<span class="tag tag-orange"><i class="ri-time-line"></i> 待发送</span>';
    } else if (e.status === 'sending') {
      statusTag = '<span class="tag tag-blue"><i class="ri-loader-4-line status-sending-icon"></i> 发送中</span>';
    } else if (e.status === 'completed') {
      statusTag = '<span class="tag tag-green"><i class="ri-checkbox-circle-line"></i> 已完成</span>';
    } else {
      statusTag = '<span class="tag" style="color:#999;background:#f0f2f5;border-color:#d9d9d9"><i class="ri-close-circle-line"></i> 已取消</span>';
    }
    
    // Progress bar
    const progressFillCls = isCompleted ? 'broadcast-progress-fill completed' : 'broadcast-progress-fill';
    const progressCell = `
      <div>
        <div class="broadcast-progress-bar">
          <div class="${progressFillCls}" style="width:${progress}%"></div>
        </div>
        <div class="broadcast-progress-text">${e.sentCount.toLocaleString()} / ${e.targetCount.toLocaleString()}</div>
      </div>`;
    
    // Actions
    let actions = '';
    if (e.status === 'pending') {
      actions = `
        <a class="btn-link" onclick="showMessage('info','查看详情：${e.name}')"><i class="ri-eye-line"></i> 查看详情</a>
        <a class="btn-link" onclick="remindBroadcast(${e.id})"><i class="ri-notification-3-line"></i> 提醒群发</a>
        <a class="btn-link danger" onclick="cancelBroadcastEvent(${e.id},'${e.name}')"><i class="ri-close-circle-line"></i> 取消</a>
      `;
    } else {
      actions = `<a class="btn-link" onclick="showMessage('info','查看详情：${e.name}')"><i class="ri-eye-line"></i> 查看详情</a>`;
    }
    
    return `
      <tr>
        <td style="width:180px"><span class="link" onclick="showMessage('info','查看群发事件：${e.name}')">${e.name}</span></td>
        <td style="width:100px">${sendTypeTag}</td>
        <td>${contentCell}</td>
        <td style="width:120px">${e.sender}</td>
        <td style="width:120px">${e.targetCount.toLocaleString()}</td>
        <td style="width:120px"><a class="link" style="color:#1890ff" onclick="navigate('#/broadcast/record?eventId=${e.id}')">${e.sentCount.toLocaleString()}</a></td>
        <td style="width:150px">${progressCell}</td>
        <td style="width:160px">${e.sendTime || '-'}</td>
        <td style="width:100px">${statusTag}</td>
        <td style="width:160px"><div class="actions">${actions}</div></td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <div class="breadcrumb">
      <a href="#/segment/list">客户回访</a>
      <span class="sep">/</span>
      <a href="#/broadcast/event">群发</a>
      <span class="sep">/</span>
      <span class="current">群发事件</span>
    </div>
    <div class="filter-card">
      <div class="filter-bar">
        <div class="filter-item">
          <label>发送方式</label>
          <div class="tab-filter" style="margin:0">
            <div class="tab-item ${broadcastEventFilter.sendType==='all'?'active':''}" onclick="filterBroadcastEvent('all')">全部</div>
            <div class="tab-item ${broadcastEventFilter.sendType==='strategy'?'active':''}" onclick="filterBroadcastEvent('strategy')">策略触发</div>
            <div class="tab-item ${broadcastEventFilter.sendType==='manual'?'active':''}" onclick="filterBroadcastEvent('manual')">手动发送</div>
          </div>
        </div>
        <div class="filter-item">
          <label>时间范围</label>
          <input type="date" id="event-start-date" value="${broadcastEventFilter.startDate}" onchange="broadcastEventFilter.startDate=this.value">
          <span>~</span>
          <input type="date" id="event-end-date" value="${broadcastEventFilter.endDate}" onchange="broadcastEventFilter.endDate=this.value">
        </div>
        <div class="filter-item">
          <label>群发名称</label>
          <div class="search-input-wrapper">
            <i class="ri-search-line search-icon"></i>
            <input type="text" id="event-search" placeholder="搜索群发名称" value="${broadcastEventFilter.keyword}" oninput="onEventSearchInput(this)">
            <i class="ri-close-line clear-icon ${broadcastEventFilter.keyword?'show':''}" onclick="clearEventSearch()"></i>
          </div>
        </div>
      </div>
    </div>
    <div class="action-bar">
      <div class="action-title">群发事件</div>
      <button class="btn btn-primary" onclick="navigate('#/broadcast/manual')"><i class="ri-send-plane-line"></i> 手动群发</button>
    </div>
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:180px">群发名称</th>
              <th style="width:100px">发送方式</th>
              <th>群发内容</th>
              <th style="width:120px">主体</th>
              <th style="width:120px">发送客户数</th>
              <th style="width:120px">已发消息数</th>
              <th style="width:150px">发送进度</th>
              <th style="width:160px">发送时间</th>
              <th style="width:100px">状态</th>
              <th style="width:160px">操作</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <div class="pagination">
        <span class="total">共 ${filtered.length} 条</span>
        <span class="page-btn disabled"><i class="ri-arrow-left-s-line"></i></span>
        <span class="page-btn active">1</span>
        <span class="page-btn disabled"><i class="ri-arrow-right-s-line"></i></span>
      </div>
    </div>`;
}

function filterBroadcastEvent(type) {
  broadcastEventFilter.sendType = type;
  renderBroadcastEventList(document.getElementById('page-content'));
}

function onEventSearchInput(input) {
  const clearIcon = input.parentElement.querySelector('.clear-icon');
  if (input.value) {
    clearIcon.classList.add('show');
  } else {
    clearIcon.classList.remove('show');
  }
}

function clearEventSearch() {
  broadcastEventFilter.keyword = '';
  renderBroadcastEventList(document.getElementById('page-content'));
}

function searchBroadcastEvent() {
  broadcastEventFilter.keyword = document.getElementById('event-search').value;
  renderBroadcastEventList(document.getElementById('page-content'));
}

function remindBroadcast(id) {
  showMessage('success', '已发送提醒通知');
}

function cancelBroadcastEvent(id, name) {
  showModal({
    width: 420,
    title: '确认取消',
    content: `
      <div class="confirm-icon"><i class="ri-error-warning-line"></i></div>
      <div class="confirm-body">确定取消群发事件 <span class="highlight">"${name}"</span> 吗？取消后将停止发送。</div>`,
    footer: `
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmCancelBroadcastEvent(${id})">确定取消</button>`
  });
}

function confirmCancelBroadcastEvent(id) {
  const e = store.broadcastEvents.find(x => x.id === id);
  if (e) {
    e.status = 'cancelled';
  }
  closeModal();
  showMessage('success', '已取消群发事件');
  renderBroadcastEventList(document.getElementById('page-content'));
}

let manualBroadcastState = {
  step: 1,
  selectedSegments: [],
  selectedTemplate: null,
  segmentFilter: 'all',
  segmentKeyword: '',
  templateKeyword: '',
  confirmText: '',
  sending: false
};

function renderManualBroadcast(container) {
  manualBroadcastState = { step: 1, selectedSegments: [], selectedTemplate: null, segmentFilter: 'all', segmentKeyword: '', templateKeyword: '', confirmText: '', sending: false };
  renderManualBroadcastContent(container);
}

function renderManualBroadcastContent(container) {
  const s = manualBroadcastState;
  
  // Remove old footer if exists
  const oldFooter = document.querySelector('.manual-broadcast-footer');
  if (oldFooter) oldFooter.remove();
  
  const stepsHtml = `
    <div class="steps">
      <div class="step-item ${s.step > 1 ? 'completed' : ''} ${s.step === 1 ? 'active' : ''}">
        <div class="step-icon"><i class="${s.step > 1 ? 'ri-check-line' : 'ri-group-line'}"></i></div>
        <span class="step-title">选择分群</span>
      </div>
      <div class="step-item ${s.step > 2 ? 'completed' : ''} ${s.step === 2 ? 'active' : ''}">
        <div class="step-icon"><i class="${s.step > 2 ? 'ri-check-line' : 'ri-mail-send-line'}"></i></div>
        <span class="step-title">配置消息</span>
      </div>
      <div class="step-item ${s.step === 3 ? 'active' : ''}">
        <div class="step-icon"><i class="ri-check-double-line"></i></div>
        <span class="step-title">确认发送</span>
      </div>
    </div>`;
  
  let stepContent = '';
  if (s.step === 1) stepContent = renderManualStep1();
  else if (s.step === 2) stepContent = renderManualStep2();
  else stepContent = renderManualStep3();
  
  container.innerHTML = `
    <div class="breadcrumb">
      <a href="#/segment/list">客户回访</a>
      <span class="sep">/</span>
      <a href="#/broadcast/event">群发</a>
      <span class="sep">/</span>
      <a href="#/broadcast/event">群发事件</a>
      <span class="sep">/</span>
      <span class="current">手动群发</span>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      ${stepsHtml}
      <div style="padding:24px">
        ${stepContent}
      </div>
    </div>`;
  
  // Add footer
  const footer = document.createElement('div');
  footer.className = 'manual-broadcast-footer';
  if (s.step === 1) {
    footer.innerHTML = `
      <button class="btn" onclick="navigate('#/broadcast/event')">取消</button>
      <button class="btn btn-primary" onclick="manualBroadcastNext()" ${s.selectedSegments.length === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>下一步</button>`;
  } else if (s.step === 2) {
    footer.innerHTML = `

    footer.innerHTML = `
      <button class="btn" onclick="manualBroadcastPrev()">上一步</button>

  }
  document.body.appendChild(footer);
}

  } else {

}

function manualSegmentFilter(type) {

function manualSegmentSearch(value) {
  manualBroadcastState.segmentKeyword = value;
  renderManualBroadcastContent(document.getElementById('page-content'));
}

function manualTemplateSearch(value) {
  manualBroadcastState.templateKeyword = value;
  renderManualBroadcastContent(document.getElementById('page-content'));
}

function manualBroadcastNext() {
  if (manualBroadcastState.step === 1 && manualBroadcastState.selectedSegments.length === 0) {
    showMessage('warning', '请至少选择一个分群');
    return;
  }
  if (manualBroadcastState.step === 2 && !manualBroadcastState.selectedTemplate) {
    showMessage('warning', '请选择消息模板');
    return;
  }
  manualBroadcastState.step++;
  renderManualBroadcastContent(document.getElementById('page-content'));
}

function manualBroadcastPrev() {
  manualBroadcastState.step--;
  renderManualBroadcastContent(document.getElementById('page-content'));
}

function onConfirmSendInput(value) {
  manualBroadcastState.confirmText = value;
  const btn = document.getElementById('btn-confirm-send');
  if (btn) {
    if (value === '确认发送' && !manualBroadcastState.sending) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
    } else {
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
    }
  }
}

function confirmManualSend() {
  if (manualBroadcastState.confirmText !== '确认发送' || manualBroadcastState.sending) return;
  
  manualBroadcastState.sending = true;
  const btn = document.getElementById('btn-confirm-send');
  if (btn) {
    btn.disabled = true;
    btn.style.opacity = '0.5';
    btn.textContent = '发送中...';
  }
  
  // Simulate sending
  setTimeout(() => {
    manualBroadcastState.sending = false;
    const totalCustomers = manualBroadcastState.selectedSegments.reduce((sum, id) => sum + (Math.floor(Math.random() * 500) + 100), 0);
    
    // Remove footer
    const footer = document.querySelector('.manual-broadcast-footer');
    if (footer) footer.remove();
    
    showModal({
      width: 480,
      closable: false,
      content: `
        <div class="success-modal">
          <div class="success-icon"><i class="ri-checkbox-circle-line"></i></div>
          <div class="success-title">发送成功</div>

        </div>`,
      footer: false
    });
  }, 1500);
}

  showMessage('info', '搜索功能');
}

function toggleRecordSelect(id, checked) {
  const record = store.broadcastRecords.find(r => r.id === id);
  if (record) record.selected = checked;
  updateBatchActions();
}

function getFilteredBroadcastRecords() {
  let records = store.broadcastRecords;
  if (broadcastRecordFilter.eventId) {
    records = records.filter(r => r.eventId == broadcastRecordFilter.eventId);
  }
  if (broadcastRecordFilter.status !== 'all') {
    records = records.filter(r => r.status === broadcastRecordFilter.status);
  }
  if (broadcastRecordFilter.keyword) {
    const kw = broadcastRecordFilter.keyword.toLowerCase();
    records = records.filter(r => r.customerName.toLowerCase().includes(kw) || r.wechatId.toLowerCase().includes(kw));
  }
  return records;
}

function cancelSelectAllRecords() {
  store.broadcastRecords.forEach(r => r.selected = false);
  renderBroadcastRecordList(document.getElementById('page-content'));
}

function toggleSelectAllRecords(checked) {
  // Get current filtered records
  const records = getFilteredBroadcastRecords();
  records.forEach(r => r.selected = checked);
  renderBroadcastRecordList(document.getElementById('page-content'));
}

function updateBatchActions() {
  const batchBar = document.getElementById('batch-actions');
  const countEl = document.getElementById('selected-count');
  const selectedCount = store.broadcastRecords.filter(r => r.selected).length;
  if (selectedCount > 0) {
    batchBar.classList.add('show');
    countEl.textContent = selectedCount;
  } else {
    batchBar.classList.remove('show');
  }
}

function resendRecord(id) {

}

function batchResendRecords() {
  const selected = store.broadcastRecords.filter(r => r.selected);
  if (selected.length === 0) { showMessage('warning','请先选择记录'); return; }

function insertWelcomeVariable(key) {
  const editor = document.getElementById('welcome-editor');
  editor.focus();
  const tag = document.createElement('span');
  tag.className = 'var-tag';
  tag.contentEditable = 'false';
  tag.dataset.var = key;
  tag.innerHTML = `${key}<span class="remove-var" onclick="removeVarTag(this,event)">&times;</span>`;
  
  const selection = window.getSelection();
  if (selection.rangeCount > 0) {
    const range = selection.getRangeAt(0);
    if (editor.contains(range.commonAncestorContainer)) {
      range.insertNode(tag);
      range.setStartAfter(tag);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    } else {
      editor.appendChild(tag);
    }
  } else {
    editor.appendChild(tag);
  }
  
  document.getElementById('welcome-var-panel').classList.remove('show');
  onWelcomeEditorInput();
}

function onWelcomeEditorInput() {
  const editor = document.getElementById('welcome-editor');
  const content = getEditorContent();
  const charCount = document.getElementById('welcome-char-count');
  charCount.textContent = `${content.length}/2000`;
  charCount.classList.toggle('over', content.length >= 2000);
  welcomeConfigState.content = content;
  
  const preview = document.getElementById('welcome-preview');
  preview.innerHTML = renderWelcomePreview(content);
}

function renderWelcomePreview(content) {
  if (!content.trim()) {
    return '<div class="chat-bubble" style="color:var(--text-tertiary)">编辑内容后实时预览</div>';
  }
  let html = content;
  VARIABLES.forEach(v => {
    html = html.replace(new RegExp(v.key.replace(/[{}]/g, '\\$&'), 'g'), `<span style="color:var(--warning)">${v.example}</span>`);
  });
  return `<div class="chat-bubble">${html}</div>`;
}

function toggleEmployee(emp) {
  const idx = welcomeConfigState.selectedEmployees.indexOf(emp);
  if (idx > -1) {
    welcomeConfigState.selectedEmployees.splice(idx, 1);
  } else {
    welcomeConfigState.selectedEmployees.push(emp);
  }
  renderWelcomeManage(document.getElementById('page-content'));
}

function resetWelcomeConfig() {
  store.welcomeConfig = {
    enabled: true,
    messageType: 'text',
    content: '尊敬的{{客户姓名}}，您好！欢迎关注我们，如有任何问题请随时联系。',
    sendDelay: 'immediate',
    selectedEmployees: ['李医生', '王护士', '赵医生']
  };
  showMessage('success', '已重置为默认配置');
  renderWelcomeManage(document.getElementById('page-content'));
}

function saveWelcomeConfig() {
  store.welcomeConfig = { ...welcomeConfigState };
  showMessage('success', '保存成功');
}

// ===== Welcome Record =====
let welcomeRecordFilter = { status: 'all', strategy: '', keyword: '' };

function renderWelcomeRecord(container) {
  const data = store.welcomeRecords;
  const stats = store.welcomeStats;
  
  // 获取欢迎语策略列表（用于筛选下拉）
  const welcomeStrategies = store.strategies.filter(s => s.actionType === 'welcome_message');
  const strategyOptions = welcomeStrategies.map(s => 
    `<option value="${s.id}" ${welcomeRecordFilter.strategy==s.id?'selected':''}>${s.name}</option>`
  ).join('');
  
  // 消息类型映射
  const msgTypeMap = {
    'text': { label: '文本', cls: 'msg-type-text' },
    'image_text': { label: '图片+文本', cls: 'msg-type-image_text' },
    'mini_program': { label: '小程序', cls: 'msg-type-mini_program' },
    'link': { label: '图文链接', cls: 'msg-type-link' },
    'image': { label: '图片', cls: 'msg-type-image' },
    'video': { label: '视频', cls: 'msg-type-video' },
    'file': { label: '文件', cls: 'msg-type-file' }
  };
  
  let tableRows = data.map(r => {
    let statusTag = r.status === 'success' 
      ? '<span class="tag tag-green">发送成功</span>' 
      : '<span class="tag tag-red">发送失败</span>';
    
    let typeInfo = msgTypeMap[r.messageType] || { label: '文本', cls: 'msg-type-text' };
    let typeTag = `<span class="msg-type-tag ${typeInfo.cls}">${typeInfo.label}</span>`;
    
    // 截断内容，hover显示完整
    let contentDisplay = r.content.length > 30 
      ? `<span class="tooltip-wrapper"><span class="text-ellipsis" style="max-width:200px">${r.content.substring(0,30)}...</span><span class="tooltip-content">${r.content}</span></span>`
      : r.content;
    
    return `
      <tr>
        <td style="width:120px;text-align:left">${r.customerName}</td>
        <td style="width:150px;text-align:left;color:#666">${r.wechatId}</td>
        <td style="width:150px"><a class="link" onclick="showMessage('info','查看策略详情：${r.strategyName}')">${r.strategyName}</a></td>
        <td style="width:120px;text-align:center">${r.employeeName}</td>
        <td>${contentDisplay}</td>
        <td style="width:100px">${typeTag}</td>
        <td style="width:160px;text-align:center">${r.sendTime}</td>
        <td style="width:100px">${statusTag}</td>
        <td style="width:150px">${r.failReason || '-'}</td>
        <td style="width:100px">
          <a class="btn-link" onclick="showWelcomeDetail(${r.id})">查看详情</a>
        </td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <div class="breadcrumb">
      <a href="#/segment/list">客户回访</a>
      <span class="sep">/</span>
      <a href="#/broadcast/event">群发</a>
      <span class="sep">/</span>
      <span class="current">欢迎语</span>
    </div>
    
    <div class="stats-cards">
      <div class="stats-card">
        <div class="stats-icon" style="background:rgba(24,144,255,0.1);color:#1890ff"><i class="ri-send-plane-fill"></i></div>
        <div class="stats-info">
          <div class="stats-value">${stats.totalSend.toLocaleString()}</div>
          <div class="stats-label">总发送数</div>
        </div>
      </div>
      <div class="stats-card">
        <div class="stats-icon" style="background:rgba(82,196,26,0.1);color:#52c41a"><i class="ri-check-line"></i></div>
        <div class="stats-info">
          <div class="stats-value">${stats.successCount.toLocaleString()}</div>
          <div class="stats-label">发送成功</div>
        </div>
      </div>
      <div class="stats-card clickable" onclick="filterWelcomeRecordByFailed()">
        <div class="stats-icon" style="background:rgba(245,34,45,0.1);color:#f5222d"><i class="ri-close-line"></i></div>
        <div class="stats-info">
          <div class="stats-value">${stats.failCount}</div>
          <div class="stats-label">发送失败</div>
        </div>
      </div>
      <div class="stats-card">
        <div class="stats-icon" style="background:rgba(24,144,255,0.1);color:#1890ff"><i class="ri-pie-chart-line"></i></div>
        <div class="stats-info">
          <div class="stats-value">${stats.successRate}</div>
          <div class="stats-label">成功率</div>
        </div>
      </div>
    </div>
    
    <div class="filter-card">
      <div class="filter-bar">
        <div class="filter-item">
          <label>策略名称</label>
          <select id="welcome-strategy-filter" style="width:200px" onchange="welcomeRecordFilter.strategy=this.value">
            <option value="">请选择策略</option>
            ${strategyOptions}
          </select>
        </div>
        <div class="filter-item">
          <label>发送状态</label>
          <div class="tab-filter" style="margin:0">
            <div class="tab-item ${welcomeRecordFilter.status==='all'?'active':''}" onclick="filterWelcomeRecord('all')">全部</div>
            <div class="tab-item ${welcomeRecordFilter.status==='success'?'active':''}" onclick="filterWelcomeRecord('success')">发送成功</div>
            <div class="tab-item ${welcomeRecordFilter.status==='failed'?'active':''}" onclick="filterWelcomeRecord('failed')">发送失败</div>
          </div>
        </div>
        <div class="filter-item">
          <label>时间范围</label>
          <input type="date" id="welcome-start-time" style="width:140px">
          <span>至</span>
          <input type="date" id="welcome-end-time" style="width:140px">
        </div>
        <div class="filter-item">
          <label>客户搜索</label>
          <div class="search-input-wrapper" style="width:240px">
            <i class="ri-search-line search-icon"></i>
            <input type="text" id="welcome-search" placeholder="搜索客户姓名或微信号" value="${welcomeRecordFilter.keyword}" style="width:100%">
          </div>
        </div>
        <button class="btn" onclick="searchWelcomeRecord()"><i class="ri-search-line"></i> 搜索</button>
      </div>
    </div>
    
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:120px;text-align:left">客户姓名</th>
              <th style="width:150px;text-align:left">微信号</th>
              <th style="width:150px">关联策略</th>
              <th style="width:120px;text-align:center">接收员工</th>
              <th>发送内容</th>
              <th style="width:100px">消息类型</th>
              <th style="width:160px;text-align:center">发送时间</th>
              <th style="width:100px">发送状态</th>
              <th style="width:150px">失败原因</th>
              <th style="width:100px">操作</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <div class="pagination">
        <span class="total">共 ${data.length} 条</span>
        <span class="page-btn disabled"><i class="ri-arrow-left-s-line"></i></span>
        <span class="page-btn active">1</span>
        <span class="page-btn disabled"><i class="ri-arrow-right-s-line"></i></span>
      </div>
    </div>`;
}

function filterWelcomeRecord(status) {
  welcomeRecordFilter.status = status;
  renderWelcomeRecord(document.getElementById('page-content'));
}

function filterWelcomeRecordByFailed() {
  welcomeRecordFilter.status = 'failed';
  renderWelcomeRecord(document.getElementById('page-content'));
}

function searchWelcomeRecord() {
  welcomeRecordFilter.keyword = document.getElementById('welcome-search').value;
  showMessage('info', '搜索功能');
}

function showWelcomeDetail(id) {
  const r = store.welcomeRecords.find(x => x.id === id);
  if (!r) return;
  
  // 消息类型映射
  const msgTypeMap = {
    'text': '文本',
    'image_text': '图片+文本',
    'mini_program': '小程序',
    'link': '图文链接',
    'image': '图片',
    'video': '视频',
    'file': '文件'
  };
  
  let typeText = msgTypeMap[r.messageType] || '文本';
  let statusTag = r.status === 'success' 
    ? '<span class="tag tag-green">发送成功</span>' 
    : '<span class="tag tag-red">发送失败</span>';
  
  // 根据消息类型渲染不同的内容展示
  let contentHtml = '';
  if (r.messageType === 'text') {
    contentHtml = `<div style="padding:12px;background:#f5f5f5;border-radius:4px;line-height:1.6">${r.content}</div>`;
  } else if (r.messageType === 'image_text') {
    contentHtml = `
      <div style="margin-bottom:12px"><img src="https://via.placeholder.com/200x120?text=Image" style="border-radius:4px;max-width:200px"></div>
      <div style="padding:12px;background:#f5f5f5;border-radius:4px;line-height:1.6">${r.content}</div>
    `;
  } else if (r.messageType === 'mini_program') {
    contentHtml = `
      <div style="border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;max-width:280px">
        <div style="background:#f5f5f5;padding:20px;text-align:center;color:#999">
          <i class="ri-mini-program-line" style="font-size:32px;color:#1890ff"></i>
        </div>
        <div style="padding:12px;background:#fff;border-top:1px solid #e8e8e8">
          <div style="font-size:14px;color:#333">${r.content}</div>
          <div style="font-size:12px;color:#999;margin-top:4px">小程序</div>
        </div>
      </div>
    `;
  } else if (r.messageType === 'link') {
    contentHtml = `
      <div style="border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;max-width:280px">
        <div style="background:#f5f5f5;padding:20px;text-align:center;color:#999">
          <i class="ri-link" style="font-size:32px;color:#fa8c16"></i>
        </div>
        <div style="padding:12px;background:#fff;border-top:1px solid #e8e8e8">
          <div style="font-size:14px;color:#333">${r.content}</div>
          <div style="font-size:12px;color:#999;margin-top:4px">图文链接</div>
        </div>
      </div>
    `;
  } else if (r.messageType === 'image') {
    contentHtml = `<div><img src="https://via.placeholder.com/200x200?text=Image" style="border-radius:4px;max-width:200px"></div>`;
  } else if (r.messageType === 'video') {
    contentHtml = `
      <div style="background:#000;border-radius:4px;overflow:hidden;max-width:280px;position:relative">
        <div style="padding:40px 20px;text-align:center">
          <i class="ri-play-circle-fill" style="font-size:48px;color:#fff;opacity:0.8"></i>
        </div>
      </div>
    `;
  } else if (r.messageType === 'file') {
    contentHtml = `
      <div style="display:flex;align-items:center;gap:12px;padding:12px;background:#f5f5f5;border-radius:4px">
        <i class="ri-file-line" style="font-size:32px;color:#1890ff"></i>
        <div>
          <div style="font-size:14px;color:#333">${r.content}</div>
          <div style="font-size:12px;color:#999">文件</div>
        </div>
      </div>
    `;
  }
  
  showModal({
    width: 560,
    title: '发送详情',
    content: `
      <div class="detail-section">
        <h4>客户信息</h4>
        <div class="detail-row"><span class="detail-label">客户姓名</span><span class="detail-value">${r.customerName}</span></div>
        <div class="detail-row"><span class="detail-label">微信号</span><span class="detail-value">${r.wechatId}</span></div>
        <div class="detail-row"><span class="detail-label">关联策略</span><span class="detail-value"><a class="link" onclick="showMessage('info','查看策略详情')">${r.strategyName}</a></span></div>
        <div class="detail-row"><span class="detail-label">接收员工</span><span class="detail-value">${r.employeeName}</span></div>
      </div>
      <div class="detail-section">
        <h4>消息内容</h4>
        ${contentHtml}
        <div class="detail-row" style="margin-top:12px"><span class="detail-label">消息类型</span><span class="detail-value">${typeText}</span></div>
      </div>
      <div class="detail-section">
        <h4>发送信息</h4>
        <div class="detail-row"><span class="detail-label">发送时间</span><span class="detail-value">${r.sendTime}</span></div>
        <div class="detail-row"><span class="detail-label">发送状态</span><span class="detail-value">${statusTag}</span></div>
        ${r.failReason ? `<div class="detail-row"><span class="detail-label">失败原因</span><span class="detail-value" style="color:var(--error)">${r.failReason}</span></div>` : ''}
      </div>
    `,
    footer: `<button class="btn btn-primary" onclick="closeModal()">关闭</button>`
  });
}

// Close var panel when clicking outside
document.addEventListener('click', e => {
  const panel = document.getElementById('var-panel');
  if (panel && panel.classList.contains('show')) {
    if (!e.target.closest('.insert-var-btn') && !e.target.closest('.var-panel')) {
      panel.classList.remove('show');
    }
  }
  const welcomePanel = document.getElementById('welcome-var-panel');
  if (welcomePanel && welcomePanel.classList.contains('show')) {
    if (!e.target.closest('.insert-var-btn') && !e.target.closest('.var-panel')) {
      welcomePanel.classList.remove('show');
    }
  }
});
</script>
</body>
</html>
